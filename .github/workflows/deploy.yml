name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run tests
        run: npm test

      - name: Detect base path
        id: base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_URL=$(echo "${{ github.event.repository.homepage || '' }}" | xargs)
          # If Pages URL is at domain root (no subpath), use '/'
          # Otherwise use '/repo-name/' (e.g. for user/org .github.io sites)
          if [[ "$GITHUB_REPOSITORY_OWNER" != "Rushenshen" ]]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
